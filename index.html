<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trayee AI - संस्कृत-सम्भाषणम्</title>
    <style>
        :root {
            --primary-color: #8B1E0B; /* ಸಾಂಪ್ರದಾಯಿಕ ಕಡುಕೆಂಪು */
            --bg-color: #F9F6F0;      /* ಗ್ರಂಥದ ಹಾಳೆಯಂತಹ ಹಿನ್ನೆಲೆ */
            --chat-bg: #FFFFFF;
            --text-color: #333333;
        }
        
        body {
            font-family: 'Siddhanta', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding: 1.5rem;
            box-sizing: border-box;
        }

        .suggestions {
            display: flex;
            gap: 12px;
            margin-bottom: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .chip {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .chip:hover {
            background: var(--primary-color);
            color: white;
        }

        .chat-box {
            flex: 1;
            background: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.2rem;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .bot {
            background-color: #F0F4F8;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .user {
            background-color: var(--primary-color);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .input-area {
            display: flex;
            gap: 12px;
            margin-top: 1.5rem;
            background: white;
            padding: 12px;
            border-radius: 30px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }

        input {
            flex: 1;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 20px;
            outline: none;
            font-family: inherit;
        }

        button.send-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.3s;
        }

        button.send-btn:hover {
            background-color: #6A1708;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">त्रयी AI</div>
        <div style="font-size: 1.1rem;">संस्कृत-ज्ञानकोशः</div>
    </header>
    
    <main class="chat-container">
        <div class="suggestions">
            <button class="chip" onclick="fillInput('सुबन्त-रूपाणि दर्शय')">सुबन्त-रूपाणि दर्शय</button>
            <button class="chip" onclick="fillInput('अयादि-सन्धिं कुरु')">अयादि-सन्धिं कुरु</button>
            <button class="chip" onclick="fillInput('अद्यतनीयं सुभाषितं वद')">अद्यतनीयं सुभाषितं वद</button>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="message bot">
               नमो नमः! अहं त्रयी ए-आई। त्वां कथं साहाय्यं कर्तुं शक्नोमि? <br>
                <span style="font-size: 0.9rem; color: #666;">(ನಮಸ್ಕಾರ! ನಾನು ತ್ರಯೀ AI. ನಾನು ನಿಮಗೆ ಹೇಗೆ ಸಹಾಯ ಮಾಡಬಲ್ಲೆ?)</span>
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="संस्कृतेन पृच्छतु..." autocomplete="off">
            <button class="send-btn" onclick="sendMessage()">प्रेषयतु (Send)</button>
        </div>
    </main>

    <script>
        // Function to handle Suggestion Chips
        function fillInput(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        // ಬ್ಯಾಕೆಂಡ್‌ಗೆ ಮೆಸೇಜ್ ಕಳುಹಿಸುವ ಫಂಕ್ಷನ್
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const messageText = input.value.trim();
            
            if (messageText !== "") {
                // ೧. ಬಳಕೆದಾರರ ಮೆಸೇಜ್ ಅನ್ನು ಚಾಟ್ ಬಾಕ್ಸ್‌ನಲ್ಲಿ ತೋರಿಸುವುದು
                const userDiv = document.createElement('div');
                userDiv.className = 'message user';
                userDiv.innerText = messageText;
                chatBox.appendChild(userDiv);
                
                input.value = '';
                chatBox.scrollTop = chatBox.scrollHeight;
                
                // ೨. AI ಉತ್ತರ ಬರುವವರೆಗೆ 'ಲೋಡಿಂಗ್' ಸಂದೇಶ ತೋರಿಸುವುದು
                const botDiv = document.createElement('div');
                botDiv.className = 'message bot';
                botDiv.innerText = "उत्तमः प्रश्नः! अस्य उत्तरं अन्विष्य दास्यामि... (ಉತ್ತರವನ್ನು ಹುಡುಕಲಾಗುತ್ತಿದೆ...)";
                chatBox.appendChild(botDiv);
                chatBox.scrollTop = chatBox.scrollHeight;

                try {
                    // ೩. ಪೈಥಾನ್ ಬ್ಯಾಕೆಂಡ್‌ಗೆ (Flask) ಮಾಹಿತಿಯನ್ನು ಕಳುಹಿಸುವುದು
                    const response = await fetch('https://trayee-ai-backend.onrender.com/chat', {                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ message: messageText })
                    });
                    
                    const data = await response.json();
                    
                    // ೪. Gemini ನೀಡಿದ ಉತ್ತರವನ್ನು ಚಾಟ್ ಬಾಕ್ಸ್‌ನಲ್ಲಿ ಪ್ರದರ್ಶಿಸುವುದು
                    if(data.reply) {
                        // Markdown ಫಾರ್ಮ್ಯಾಟಿಂಗ್ ಇದ್ದರೆ ಅದನ್ನು ನಿರ್ವಹಿಸಲು ನೀವು ಮುಂದಿನ ದಿನಗಳಲ್ಲಿ marked.js ಬಳಸಬಹುದು
                        botDiv.innerText = data.reply;
                    } else {
                        botDiv.innerText = "क्षन्तव्यम्, काचित् त्रुटिः सञ्जाता। (ಕ್ಷಮಿಸಿ, ದೋಷ ಉಂಟಾಗಿದೆ)";
                    }
                } catch (error) {
                    botDiv.innerText = "क्षन्तव्यम्, सर्वर-सम्पर्कः न जातः। (ಕ್ಷಮಿಸಿ, ಸರ್ವರ್ ಜೊತೆ ಸಂಪರ್ಕ ಸಾಧ್ಯವಾಗುತ್ತಿಲ್ಲ. ಪೈಥಾನ್ ಆನ್ ಆಗಿದೆಯೇ ಪರಿಶೀಲಿಸಿ.)";
                }
                
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
            
            if (input.value.trim() !== "") {
                // User Message
                const userDiv = document.createElement('div');
                userDiv.className = 'message user';
                userDiv.innerText = input.value;
                chatBox.appendChild(userDiv);
                
                const query = input.value;
                input.value = '';
                
                // Bot Loading/Response Simulation
                setTimeout(() => {
                    const botDiv = document.createElement('div');
                    botDiv.className = 'message bot';
                    botDiv.innerText = "उत्तमः प्रश्नः! अस्य उत्तरं शीघ्रमेव अन्विष्य दास्यामि।";
                    chatBox.appendChild(botDiv);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }, 800);
                
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
        
        // Listen for Enter Key
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>

</body>
</html>
